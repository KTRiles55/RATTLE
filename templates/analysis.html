<!doctype html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<div class="d-flex-start flex-column text-white justify-content-center align-items-center vh-100 vw-100 bg-dark font-monospace">
    <img class="rounded-circle" style="width: 10rem; height:10rem; mix-blend-mode:screen" src="{{ url_for('static', filename='images/rattlelogo.jpeg') }}" alt="RATTLE Logo"/>
  <title>RATTLE Analysis</title>
  <div class="d-flex flex-column justify-content-center align-items-center">
  <h1>Scan for new threats</h1>
  <section class="d-flex flex-column text-white p-3 m-2 border border-light border-2">
     <h3>Last scanned ... days ago</h3>
     <small>Number of scans: 0</small>
     <small>Number of threats discovered: 0</small>
  </section>
  <div class="d-flex gap-4 justify-content-center align-items-center text-white
          border border-success border-4 p-3">
    <section class="d-flex flex-column p-2">
       <form class="d-flex flex-column" action="/scan-cap"
               method="POST" enctype="multipart/form-data">
         <input id="capture" name="capture" type="file" accept=".pcap"/>
         <small>Max file size: 100 MB</small>
         <small>Accepted file type: pcap</small>
         <button id="pc" class="btn d-flex-inline p-2 m-2 bg-primary text-white fw-bold
              border border-dark border-opacity-75 rounded-3" disabled>Scan Packet Capture</button>
       </form>
       <script>
          file = document.getElementById('capture');
          file.addEventListener('change', (e) => {
             button = document.getElementById('pc');
             button.disabled = false;
          });
       </script>
    </section>
      <small>Or</small>
      <form class="d-flex flex-column gap-3" action="/scan-live" method="POST" enctype="multipart/form-data">
            <input id="count" name="count" type="number" placeholder="Enter 1-99"
                    min="1" max="99"/>
        <button id="lscan" class="btn d-flex-inline p-2 bg-success border border-dark
                border-opacity-75 rounded-3 text-white fw-bold" disabled>Start Live Scan</button>
      </form>
      <script>
        number = document.getElementById('count');
        number.addEventListener('input', (e) => {
           button = document.getElementById('lscan');
           if ((number.value >= 1) && (number.value <= 99)) {
              button.disabled = false;
           }

           else {
              button.disabled = true;
           }
         });
     </script>
  </div>
</div>
  <form action="/">
  <button class="bg-danger p-2 m-4 border border-dark border-opacity-75
          rounded-3 text-white fw-bold">Go Back</button>
  </form>
</div>
