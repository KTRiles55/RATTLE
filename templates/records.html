<!doctype html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-3.5.1.min.js" charset="utf-8"></script>
</head>
<title>RATTLE records</title>
<div class="d-flex-start flex-column text-white justify-content-center align-items-center vh-100 vw-100 bg-dark font-monospace">
    <img class="rounded-circle" style="width: 10rem; height:10rem; mix-blend-mode:screen" src="{{ url_for('static', filename='images/rattlelogo.jpeg') }}" alt="RATTLE Logo"/>
  <div class="d-flex flex-row justify-content-center align-items-center bg-dark">
    <section class="d-flex flex-column justify-content-start align-items-center">
      <h2>Event Logs</h2>
      <article class="d-flex overflow-auto" style="max-height: 75vh; max-width: 60vw"> 
	 <table class="table table-dark border border-light border-1 "> 
	   <thead>
	     <tr>
	       <th scope="col">Time</th>
	       <th scope="col">Name</th>
	       <th scope="col">Src IP</th>
	       <th scope="col">Dst IP</th>
	       <th scope="col">Protocol</th>
	       <th scope="col">Src Port</th>
	       <th scope="col">Dst Port</th>
	       <th scope="col">Bytes Sent</th>
	       <th scope="col">Bytes Recvd</th>
	       <th scope="col">Flow Packets</th>
	       <th scope="col">Flow Bytes</th>
	       <th scope="col">Avg Pkt Size</th>
	       <th scope="col">Max Pkt Size</th>
	       <th scope="col"># Packets</th>
	       <th scope="col">Payload Size</th>
	     </tr>
	   </thead>
	     <tbody id="tlogs">
	     </tbody>
	  </table>
       </article>
       <div class="d-flex align-self-start">
       <form action="/">
  	   <button class="bg-danger p-2 m-4 border border-dark border-opacity-75
          		rounded-3 text-white fw-bold">Go Back</button>
  	</form>
	</div>
    </section>
    <section class="d-flex flex-column justify-content-center align-items-center">
        <article id="e-graph" class="bg-dark text-white"></article>
        <article id="type-chart" class="bg-dark text-white"></article>
    </section>
  </div>
</div>
<script>
   const x_values = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
   const y_values1 = {{ month_safe }};
   const y_values2 = {{ month_threats }};

   const trace1 = {
      x: x_values,
      y: y_values1,
      type: "bar",
      orientation: "v",
      marker: {color:"rgba(0,255,0,1)"},
      name: "Non-Threats"
   };

   const trace2 = {
      x: x_values,
      y: y_values2,
      type: "bar", 
      orientation: "v",
      marker: {color:"rgba(255,165,0,1)"}, 
      name: "Threats"
   };

   const data = [trace1, trace2];

   const layout = {
	   title: { text: "Threats over time", font: { color: '#ffffff', size: 24 } },
	   barmode: "group",
	   xaxis: {title: { text: "Months" }, showgrid: true, gridcolor: '#ffffff' },
	   yaxis: {title: { text: "Total Discovered" }, showgrid: true, gridcolor: '#ffffff' },
	   plot_bgcolor: '#212529',
	   paper_bgcolor: '#212529',
	   font: {
	      color: '#ffffff'
	   }
   };

   Plotly.newPlot("e-graph", data, layout);
</script>
<script>
  const lbls = {{ types | tojson }};
  const vals = {{ count }};

  const template = [{
    labels: lbls,
    values: vals,
    type: 'pie'
  }];
  
  const style = {
    title: { text: "Discovered Threat Types", font: { color: '#ffffff', size: 24 } },
    height: 700,
    width: 800,
    plot_bgcolor: '#212529',
    paper_bgcolor: '#212529',
    font: { color: '#ffffff' }
  };

  Plotly.newPlot("type-chart", template, style);
</script>
<script>
   const packets = {{ traffic | tojson }};
   const traffic_table = document.getElementById("tlogs");

   for (let i = 0; i < packets.length; ++i) {
      let new_row = traffic_table.insertRow(0);
      
      new_row.insertCell(0).textContent = packets[i]["Time"];
      new_row.insertCell(1).textContent = packets[i]["Name"];
      new_row.insertCell(2).textContent = packets[i]["Source IP"];
      new_row.insertCell(3).textContent = packets[i]["Destination IP"];
      new_row.insertCell(4).textContent = packets[i]["Protocol"];
      new_row.insertCell(5).textContent = packets[i]["Source Port"];
      new_row.insertCell(6).textContent = packets[i]["Destination Port"];
      new_row.insertCell(7).textContent = packets[i]["Bytes Sent"];
      new_row.insertCell(8).textContent = packets[i]["Bytes Received"];
      new_row.insertCell(9).textContent = packets[i]["Flow Packets"];
      new_row.insertCell(10).textContent = packets[i]["Flow Bytes"];
      new_row.insertCell(11).textContent = packets[i]["Average Packet Size"];
      new_row.insertCell(12).textContent = packets[i]["Max Packet Size"];
      new_row.insertCell(13).textContent = packets[i]["Number of Packets"];
      new_row.insertCell(14).textContent = packets[i]["Payload Size"];
   }
</script>
